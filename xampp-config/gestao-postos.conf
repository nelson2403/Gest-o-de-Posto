# ============================================================
# Configuração do Apache (XAMPP) para o Sistema de Gestão
#
# COMO USAR:
# 1. Copie este arquivo para: C:\xampp\apache\conf\extra\
# 2. Abra: C:\xampp\apache\conf\httpd.conf
# 3. Adicione no final do arquivo:
#    Include conf/extra/gestao-postos.conf
# 4. Descomente as linhas mod_proxy no httpd.conf:
#    LoadModule proxy_module modules/mod_proxy.so
#    LoadModule proxy_http_module modules/mod_proxy_http.so
#    LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
# 5. Reinicie o Apache no painel do XAMPP
# 6. Inicie o Next.js: npm start (porta 3000)
# 7. Acesse em: http://localhost/gestao
# ============================================================

<VirtualHost *:80>
    ServerName localhost

    # Proxy para o Next.js rodando na porta 3000
    # Acesse em: http://localhost/gestao
    ProxyRequests Off
    ProxyPreserveHost On

    # WebSocket (necessário para hot reload em dev)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule /gestao/(.*) ws://127.0.0.1:3000/$1 [P,L]

    # HTTP normal
    ProxyPass        /gestao/ http://127.0.0.1:3000/
    ProxyPassReverse /gestao/ http://127.0.0.1:3000/

    # Headers
    ProxyPassReverseCookiePath / /gestao/
    Header always set X-Forwarded-Proto "http"

    ErrorLog  "logs/gestao-postos-error.log"
    CustomLog "logs/gestao-postos-access.log" common
</VirtualHost>
